<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7c3aed" />
  <title>Bracelet Studio V2</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Bracelet Studio <span>V2</span></h1>
      <p>Générateur normal + alpha, optimisé iPad</p>
    </div>
    <div class="actions">
      <button id="saveBtn">Sauvegarder</button>
      <button id="exportBtn">Exporter PNG</button>
      <button id="resetBtn" class="ghost">Nouveau</button>
    </div>
  </header>

  <main class="app">
    <aside class="panel">
      <section class="card">
        <h2>Type de bracelet</h2>
        <div class="segmented">
          <button class="active" data-mode="normal">Normal</button>
          <button data-mode="alpha">Alpha</button>
        </div>
      </section>

      <section class="card">
        <h2>Réglages</h2>
        <label>Motif
          <select id="patternSelect">
            <option value="chevron">Chevrons</option>
            <option value="diamonds">Diamants</option>
            <option value="waves">Vagues</option>
            <option value="hearts">Cœurs</option>
            <option value="alphaName">Alpha prénom</option>
          </select>
        </label>
        <label>Nombre de fils
          <input id="threadsInput" type="range" min="6" max="24" step="2" value="12" />
          <strong id="threadsValue">12</strong>
        </label>
        <label>Nombre de rangées
          <input id="rowsInput" type="range" min="12" max="64" value="30" />
          <strong id="rowsValue">30</strong>
        </label>
        <label id="alphaTextWrap">Texte alpha
          <input id="alphaText" type="text" value="LOVE" maxlength="12" />
        </label>
      </section>

      <section class="card">
        <h2>Couleurs</h2>
        <div id="palette" class="palette"></div>
        <button id="addColorBtn" class="wide">Ajouter une couleur</button>
      </section>

      <section class="card small">
        <h2>Mode tissage</h2>
        <p>Touche un nœud pour le marquer comme fait. La progression est gardée sur l’iPad.</p>
        <button id="clearProgressBtn" class="wide ghost">Effacer progression</button>
      </section>
    </aside>

    <section class="workspace">
      <div class="preview card">
        <div class="section-title">
          <h2>Aperçu du bracelet</h2>
          <span id="statusText">Prêt</span>
        </div>
        <canvas id="braceletCanvas" width="1200" height="220"></canvas>
      </div>

      <div class="board card">
        <div class="section-title">
          <h2>Patron de nœuds</h2>
          <span>Pince avec 2 doigts pour zoomer</span>
        </div>
        <div class="gridWrap" id="gridWrap">
          <canvas id="patternCanvas" width="1200" height="1600"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
